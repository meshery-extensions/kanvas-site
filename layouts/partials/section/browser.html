<div class="section-header centered">
  <h2>See Kanvas in Action</h2>
</div>

<div class="browser-shell">
  <div class="browser-header">
    <div class="browser-dots">
      <div class="browser-dot dot-red"></div>
      <div class="browser-dot dot-yellow"></div>
      <div class="browser-dot dot-green"></div>
    </div>
    <div class="browser-pill">https://kanvas.new/extension/meshmap</div>
  </div>

  <div class="browser-body">
    <div class="hero-visual" style="padding: 0; margin: 0; width: 100%;">
      <div class="canvas-preview glass--dark" style="border-radius: 0; border-left: none; border-right: none;">
        <div class="canvas-header" style="padding: 1rem 2rem;">
          <span>Production</span>
          <span class="status">Collaboration</span>
        </div>

        {{ partial "cube-scene.html" (dict "Ordinal" 1) }}

      </div>
    </div>

    <div class="browser-cta-container">
      <a class="browser-cta shine" href="https://layer5.io/kanvas" target="_blank" rel="noopener">
        <span class="cta-hexagon"></span>
        <span>See Kanvas in action</span>
        <span class="cta-arrow"></span>
      </a>
    </div>
  </div>
</div>

<div class="browser-stand"></div>
<div class="browser-glow"></div>
