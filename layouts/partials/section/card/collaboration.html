<section class="collaboration-section" id="collaboration">
    <div class="container">
        <div class="collaboration-visual">
            <div class="visual-inner">
                <!-- Team Workspace Card -->
                <div class="team-workspace-card">
                    <!-- Header -->
                    <div class="card-header">
                        <div class="header-left">
                            <div class="icon-box">
                                <i class="fas fa-users"></i>
                            </div>
                            <div class="titles">
                                <h3>Team Workspace</h3>
                                <p>5 collaborators online</p>
                            </div>
                        </div>
                        <div class="header-right">
                            <div class="avatars">
                                <span class="initials">RN</span>
                                <span class="initials">OA</span>
                                <span class="initials">JE</span>
                            </div>
                            <button class="add-btn">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Main Canvas with Cursors — exact same structure as hero canvas-preview -->
                    <div class="card-canvas" data-cursors="0,1,2,3,4" data-social-proof="online=22">
                        <div class="cursor-social-proof" aria-live="polite"></div>

                        <div class="canvas-grid">
                            <div class="connector connector--one"></div>
                            <div class="connector connector--two"></div>
                            <div class="connector connector--three"></div>
                            <div class="node node--a"></div>
                            <div class="node node--b"></div>
                            <div class="node node--c"></div>
                            <div class="node node--d"></div>
                            <div class="node node--e"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
